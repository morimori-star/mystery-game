<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推理ゲーム — 殺人事件</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #efefef;
    color: #1a1a1a;
    font-family: 'Georgia', 'Hiragino Mincho ProN', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }

  h1 {
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: #7a4e1e;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #999;
    letter-spacing: 0.15em;
    margin-bottom: 40px;
  }

  /* API key section */
  #apiSection {
    width: 100%;
    max-width: 560px;
    margin-bottom: 32px;
    background: #fff;
    border: 1px solid #d8d8d8;
    border-radius: 8px;
    padding: 20px 24px;
  }

  #apiSection label {
    font-size: 0.8rem;
    color: #888;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 8px;
  }

  #apiSection .row {
    display: flex;
    gap: 8px;
  }

  #apiKeyInput {
    flex: 1;
    background: #f8f8f8;
    border: 1px solid #ccc;
    border-radius: 4px;
    color: #1a1a1a;
    font-size: 0.85rem;
    padding: 8px 12px;
    outline: none;
  }

  #apiKeyInput:focus { border-color: #7a4e1e; }

  .btn-sm {
    background: #f0f0f0;
    border: 1px solid #ccc;
    border-radius: 4px;
    color: #555;
    cursor: pointer;
    font-size: 0.8rem;
    padding: 8px 14px;
    transition: all 0.2s;
  }
  .btn-sm:hover { border-color: #7a4e1e; color: #7a4e1e; }

  /* Main card */
  #gameCard {
    width: 100%;
    max-width: 700px;
    background: #fff;
    border: 1px solid #d8d8d8;
    border-radius: 12px;
    padding: 32px;
    position: relative;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Start screen */
  #startScreen {
    text-align: center;
    padding: 60px 0;
  }

  .start-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  .start-text {
    color: #777;
    font-size: 0.9rem;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #7a4e1e, #b8894e);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 1rem;
    letter-spacing: 0.15em;
    padding: 14px 40px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(122,78,30,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loading */
  #loadingScreen {
    text-align: center;
    padding: 80px 0;
    display: none;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #ddd;
    border-top-color: #7a4e1e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: #999;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  /* Story screen */
  #storyScreen { display: none; }

  .section-title {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: #7a4e1e;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .story-box {
    background: #f8f8f8;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 24px;
    line-height: 2;
    font-size: 0.92rem;
    margin-bottom: 24px;
    white-space: pre-wrap;
    color: #222;
  }

  .characters-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .character-tag {
    background: #ebebeb;
    border: 1px solid #d0d0d0;
    border-radius: 20px;
    color: #444;
    font-size: 0.8rem;
    padding: 4px 12px;
  }

  /* Questions */
  .questions-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .question-count {
    font-size: 0.8rem;
    color: #888;
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ddd;
    border: 1px solid #bbb;
    transition: all 0.3s;
  }

  .dot.used { background: #7a4e1e; border-color: #7a4e1e; }

  .qa-list {
    margin-bottom: 16px;
  }

  .qa-item {
    margin-bottom: 16px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .qa-q {
    font-size: 0.85rem;
    color: #7a4e1e;
    margin-bottom: 4px;
  }

  .qa-q::before { content: "Q. "; }

  .qa-a {
    font-size: 0.88rem;
    color: #333;
    line-height: 1.7;
    padding-left: 16px;
    border-left: 2px solid #d8d8d8;
  }

  .qa-a::before { content: "A. "; color: #999; }

  .question-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }

  .question-input {
    flex: 1;
    background: #f8f8f8;
    border: 1px solid #ccc;
    border-radius: 6px;
    color: #1a1a1a;
    font-size: 0.88rem;
    padding: 10px 14px;
    outline: none;
    font-family: inherit;
  }

  .question-input:focus { border-color: #7a4e1e; }

  .btn-ask {
    background: #f0f0f0;
    border: 1px solid #ccc;
    border-radius: 6px;
    color: #7a4e1e;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 10px 18px;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-ask:hover { background: #e8e8e8; border-color: #7a4e1e; }
  .btn-ask:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Answer loading */
  .answer-loading {
    font-size: 0.8rem;
    color: #999;
    padding: 8px 0;
    display: none;
  }

  /* Guess section */
  .divider {
    border: none;
    border-top: 1px solid #e0e0e0;
    margin: 8px 0 24px;
  }

  .guess-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .guess-select {
    flex: 1;
    background: #f8f8f8;
    border: 1px solid #ccc;
    border-radius: 6px;
    color: #1a1a1a;
    font-size: 0.88rem;
    padding: 10px 14px;
    outline: none;
    font-family: inherit;
    cursor: pointer;
  }
  .guess-select:focus { border-color: #7a4e1e; }

  .btn-guess {
    background: linear-gradient(135deg, #8b2020, #c03030);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    padding: 10px 20px;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-guess:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(192,48,48,0.3); }
  .btn-guess:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Result */
  #resultScreen { display: none; }

  .result-box {
    text-align: center;
    padding: 32px 0 24px;
  }

  .result-icon { font-size: 2.5rem; margin-bottom: 12px; }

  .result-title {
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .result-correct { color: #2a7a4a; }
  .result-wrong { color: #b03030; }

  .result-subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 28px;
  }

  .reveal-box {
    background: #f8f8f8;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 28px;
    text-align: left;
  }

  .reveal-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: #999;
    margin-bottom: 6px;
  }

  .reveal-culprit {
    font-size: 1.1rem;
    color: #7a4e1e;
    margin-bottom: 16px;
  }

  .reveal-explanation {
    font-size: 0.88rem;
    color: #333;
    line-height: 1.8;
  }

  .replay-btn {
    background: #f0f0f0;
    border: 1px solid #ccc;
    border-radius: 6px;
    color: #7a4e1e;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    padding: 12px 32px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .replay-btn:hover { border-color: #7a4e1e; background: #e8e8e8; }

  .error-msg {
    background: #fff0f0;
    border: 1px solid #e0b0b0;
    border-radius: 6px;
    color: #b03030;
    font-size: 0.82rem;
    padding: 12px 16px;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>

<h1>推　理　ゲ　ー　ム</h1>
<p class="subtitle">— MURDER MYSTERY —</p>

<div id="apiSection">
  <label>ANTHROPIC API KEY <span style="color:#555;font-size:0.75rem">（省略可 — 管理者がサーバーに設定済みの場合）</span></label>
  <div class="row">
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
    <button class="btn-sm" onclick="saveKey()">保存</button>
  </div>
  <div id="apiKeyMsg" style="font-size:0.75rem;color:#888;margin-top:6px;"></div>
</div>

<div id="gameCard">

  <!-- Start -->
  <div id="startScreen">
    <div class="start-icon">🕯️</div>
    <p class="start-text">
      密室、疑惑、そして嘘。<br>
      3つの質問で真実を暴け。
    </p>
    <button class="btn-primary" id="startBtn" onclick="startGame()">ゲーム開始</button>
    <div class="error-msg" id="startError"></div>
  </div>

  <!-- Loading -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <p class="loading-text">事件を生成中…</p>
  </div>

  <!-- Story + Questions -->
  <div id="storyScreen">
    <p class="section-title">▸ 事件の概要</p>
    <p id="storyTitle" style="font-size:1.1rem;color:#c8a96e;letter-spacing:0.05em;margin-bottom:12px;font-style:italic;"></p>
    <div class="story-box" id="storyText"></div>

    <p class="section-title">▸ 登場人物</p>
    <div class="characters-row" id="charactersList"></div>

    <div class="questions-header">
      <p class="section-title" style="margin:0">▸ 質問（最大3回）</p>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="question-count" id="questionCountText">残り 3 回</span>
        <div class="dots">
          <div class="dot" id="dot1"></div>
          <div class="dot" id="dot2"></div>
          <div class="dot" id="dot3"></div>
        </div>
      </div>
    </div>

    <div class="qa-list" id="qaList"></div>
    <p class="answer-loading" id="answerLoading">回答を生成中…</p>

    <div class="question-input-row">
      <input
        type="text"
        class="question-input"
        id="questionInput"
        placeholder="探偵として質問を入力してください…"
        maxlength="200"
      >
      <button class="btn-ask" id="askBtn" onclick="askQuestion()">質問する</button>
    </div>

    <hr class="divider">

    <p class="section-title">▸ 犯人を指名する</p>
    <div class="guess-row">
      <select class="guess-select" id="guessSelect">
        <option value="">— 容疑者を選択 —</option>
      </select>
      <button class="btn-guess" id="guessBtn" onclick="makeGuess()">指名する</button>
    </div>
    <div class="error-msg" id="questionError"></div>
  </div>

  <!-- Result -->
  <div id="resultScreen">
    <div class="result-box">
      <div class="result-icon" id="resultIcon"></div>
      <h2 class="result-title" id="resultTitle"></h2>
      <p class="result-subtitle" id="resultSubtitle"></p>
    </div>

    <div class="reveal-box">
      <p class="reveal-label">TRUE CULPRIT</p>
      <p class="reveal-culprit" id="revealCulprit"></p>
      <p class="reveal-label">EXPLANATION</p>
      <p class="reveal-explanation" id="revealExplanation"></p>
    </div>

    <div style="text-align:center">
      <button class="replay-btn" onclick="resetGame()">もう一度プレイ</button>
    </div>
  </div>

</div>

<script>
const MODEL = 'claude-opus-4-7';
const API_URL = '/api/gemini';

let state = {
  apiKey: '',
  title: '',
  story: '',
  characters: [],
  culprit: '',
  explanation: '',
  clues: [],
  questionsLeft: 3,
  qaHistory: [],
};

// API key persistence
(function init() {
  const saved = localStorage.getItem('mystery_api_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    state.apiKey = saved;
    document.getElementById('apiKeyMsg').textContent = '✓ APIキーが読み込まれました';
  }
})();

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  state.apiKey = key;
  localStorage.setItem('mystery_api_key', key);
  document.getElementById('apiKeyMsg').textContent = '✓ 保存しました';
}

function show(id) {
  ['startScreen','loadingScreen','storyScreen','resultScreen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function showError(elemId, msg) {
  const el = document.getElementById(elemId);
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError(elemId) {
  document.getElementById(elemId).style.display = 'none';
}

async function callClaude(systemPrompt, userMessage, prevMessages = []) {
  const key = document.getElementById('apiKeyInput').value.trim() || state.apiKey;

  const messages = [...prevMessages, { role: 'user', content: userMessage }];

  const headers = {
    'anthropic-version': '2023-06-01',
    'content-type': 'application/json',
  };
  if (key) headers['x-api-key'] = key;

  const res = await fetch(API_URL, {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 2000,
      system: systemPrompt,
      messages,
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `APIエラー (${res.status})`);
  }

  const data = await res.json();
  return data.content[0].text;
}

async function startGame() {
  hideError('startError');
  const key = document.getElementById('apiKeyInput').value.trim() || state.apiKey;
  if (key) state.apiKey = key;

  document.getElementById('startBtn').disabled = true;
  show('loadingScreen');

  const theme = getRandomTheme();
  const systemPrompt = `# Role
あなたは一流のミステリー作家兼、厳格なゲームマスターです。プレイヤーが「3つの質問」で犯人を当てるショートミステリーゲームを提供します。

必ず以下のJSON形式のみで返答し、コードブロックや説明文は不要です:
{
  "title": "ストーリーを象徴するタイトル",
  "story": "2000文字程度の事件概要（被害者・状況・各容疑者の証言・行動）",
  "characters": ["氏名1（役割）", "氏名2（役割）", ...],
  "culprit": "犯人の氏名（charactersのいずれか）",
  "explanation": "犯行動機・方法・証拠を含む200文字程度の真相解説",
  "clues": ["真犯人を示す決定的手がかり", "見落としやすいが重要な手がかり", "ニセの手がかりの正体"]
}

今回の設定（必ず従うこと）:
- 時代: ${theme.period}
- 舞台: ${theme.setting}
- 主な動機: ${theme.motive}

条件:
- 登場人物は4〜6人（被害者含む）
- 物理的、論理的な「矛盾（トリック）」を必ず一つ仕込むこと
- 証拠品や状況描写の中に、解決の鍵を伏線として隠すこと
- 犯人以外の容疑者にも「疑わしく見える動機や行動」を必ず持たせる（ミスリード）
- 第一印象では別の人物が怪しく見えるように構成する
- 答えは論理的に導けるが、注意深く読まないと気づかない難易度にする`;

  try {
    const raw = await callClaude(systemPrompt, '新しい事件を生成してください。');
    let json;
    try {
      const m = raw.match(/\{[\s\S]*\}/);
      json = JSON.parse(m ? m[0] : raw);
    } catch {
      throw new Error('ストーリーの解析に失敗しました。もう一度お試しください。');
    }

    state.title = json.title || '';
    state.story = json.story;
    state.characters = json.characters;
    state.culprit = json.culprit;
    state.explanation = json.explanation;
    state.clues = json.clues || [];
    state.questionsLeft = 3;
    state.qaHistory = [];

    renderStoryScreen();
    show('storyScreen');
  } catch (e) {
    show('startScreen');
    showError('startError', e.message);
  } finally {
    document.getElementById('startBtn').disabled = false;
  }
}

function renderStoryScreen() {
  document.getElementById('storyTitle').textContent = state.title ? `「${state.title}」` : '';
  document.getElementById('storyText').textContent = state.story;

  const chars = document.getElementById('charactersList');
  chars.innerHTML = '';
  state.characters.forEach(c => {
    const tag = document.createElement('span');
    tag.className = 'character-tag';
    tag.textContent = c;
    chars.appendChild(tag);
  });

  const sel = document.getElementById('guessSelect');
  sel.innerHTML = '<option value="">— 容疑者を選択 —</option>';
  state.characters.forEach(c => {
    const name = c.split('（')[0].trim();
    if (!name.includes('被害者') && !name.includes('victim')) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = c;
      sel.appendChild(opt);
    }
  });

  document.getElementById('qaList').innerHTML = '';
  updateQuestionUI();
}

function updateQuestionUI() {
  const left = state.questionsLeft;
  document.getElementById('questionCountText').textContent = `残り ${left} 回`;
  [1,2,3].forEach(i => {
    const dot = document.getElementById(`dot${i}`);
    dot.classList.toggle('used', i > left);
  });
  const exhausted = left <= 0;
  const input = document.getElementById('questionInput');
  input.disabled = exhausted;
  document.getElementById('askBtn').disabled = exhausted;
  input.placeholder = exhausted
    ? '質問回数を使い切りました。犯人を指名してください。'
    : '探偵として質問を入力してください…';
}

async function askQuestion() {
  if (state.questionsLeft <= 0) return;
  const input = document.getElementById('questionInput');
  const q = input.value.trim();
  if (!q) return;

  hideError('questionError');
  document.getElementById('askBtn').disabled = true;
  input.disabled = true;
  document.getElementById('answerLoading').style.display = 'block';

  const systemPrompt = `あなたは推理ゲームの進行役（ナレーター）です。
以下の事件の全真相を知っています。

【事件概要】
${state.story}

【真相（プレイヤーには非公開）】
犯人: ${state.culprit}
解説: ${state.explanation}
隠れた手がかり: ${state.clues.join(' / ')}

プレイヤーの質問に、以下のルールで答えてください:
- 事実に基づいて正直に答える（嘘はつかない）
- 「犯人は○○です」と直接教えない
- 手がかりになるヒントを含めてもよい
- 100〜200文字程度で簡潔に答える
- 日本語で答える

# Context Setting (Important)
- 真相（犯人・トリック・動機）はゲーム開始時に確定しており、ゲーム終了まで変更しないこと
- 質問を通じてのみ判明する隠された事実を設定し、必要に応じて開示すること
- ハルシネーション（矛盾した回答）を防ぐため、常に上記の真相と照らし合わせて回答すること`;

  const historyMessages = state.qaHistory.flatMap(qa => [
    { role: 'user', content: qa.q },
    { role: 'assistant', content: qa.a },
  ]);

  try {
    const answer = await callClaude(systemPrompt, q, historyMessages);
    state.qaHistory.push({ q, a: answer });
    state.questionsLeft--;

    const qaList = document.getElementById('qaList');
    const item = document.createElement('div');
    item.className = 'qa-item';
    item.innerHTML = `
      <p class="qa-q">${escHtml(q)}</p>
      <p class="qa-a">${escHtml(answer)}</p>
    `;
    qaList.appendChild(item);

    input.value = '';
    updateQuestionUI();
  } catch (e) {
    showError('questionError', e.message);
  } finally {
    document.getElementById('answerLoading').style.display = 'none';
    if (state.questionsLeft > 0) {
      document.getElementById('askBtn').disabled = false;
      input.disabled = false;
    }
  }
}

function makeGuess() {
  const sel = document.getElementById('guessSelect');
  const guess = sel.value.trim();
  if (!guess) { showError('questionError', '容疑者を選択してください。'); return; }
  hideError('questionError');

  const culpritName = state.culprit.split('（')[0].trim();
  const guessName = guess.split('（')[0].trim();
  const correct = culpritName === guessName || state.culprit.includes(guessName) || guess.includes(culpritName);

  document.getElementById('resultIcon').textContent = correct ? '🎉' : '💀';
  document.getElementById('resultTitle').textContent = correct ? '正解！' : '不正解…';
  document.getElementById('resultTitle').className = `result-title ${correct ? 'result-correct' : 'result-wrong'}`;
  document.getElementById('resultSubtitle').textContent = correct
    ? 'あなたは名探偵だ。真実を見抜いた。'
    : `あなたは ${guessName} を指名した。しかし…`;

  document.getElementById('revealCulprit').textContent = state.culprit;
  document.getElementById('revealExplanation').textContent = state.explanation;

  show('resultScreen');
}

function resetGame() {
  show('startScreen');
  document.getElementById('startBtn').disabled = false;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// IME変換中のEnterキーで送信されないようにする
(function setupInputHandler() {
  const input = document.getElementById('questionInput');
  let composing = false;
  input.addEventListener('compositionstart', () => { composing = true; });
  input.addEventListener('compositionend', () => { composing = false; });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !composing) askQuestion();
  });
})();

function getRandomTheme() {
  const periods = [
    '現代', '昭和30年代', '昭和50年代', '明治時代', '大正時代', '江戸時代',
    '1920年代のヨーロッパ', '戦後の東京', 'バブル期の日本', '幕末'
  ];
  const settings = [
    '豪華客船', '山奥の洋館', '孤島のリゾート', '総合病院', '全寮制学校',
    '高級ホテル', '農村の旧家', '美術館', '劇団の合宿所', '閉鎖されたスキー場',
    '温泉旅館', '大学のキャンパス', '老舗料亭', '地方の警察署'
  ];
  const motives = [
    '遺産相続', '復讐', '口封じ', '嫉妬', '横領の隠蔽', '失恋', '秘密の暴露阻止'
  ];
  const p = periods[Math.floor(Math.random() * periods.length)];
  const s = settings[Math.floor(Math.random() * settings.length)];
  const m = motives[Math.floor(Math.random() * motives.length)];
  return { period: p, setting: s, motive: m };
}
